<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Core — Web Terminal</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script type="module" src="/static/app.js"></script>
</head>
<body>

  <div class="topbar">
  <div class="logo">⛏️ Bitcoin Core Terminal</div>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">connecting...</span>
  </div>
  <div class="spacer"></div>
  <div class="topbar-right">
    <div class="lang-menu" id="lang-menu">
      <button class="lang-menu-btn" id="lang-menu-btn" type="button">
        <span class="flag" id="lang-flag">🇬🇧</span>
        <span class="chev">▾</span>
      </button>
      <div class="lang-menu-pop" id="lang-menu-pop" hidden>
        <button class="lang-option" type="button" data-lang="en-GB">
          <span class="flag">🇬🇧</span>
          <span class="label" id="lang-label-en">English (UK)</span>
          <span class="check">✓</span>
        </button>
        <button class="lang-option" type="button" data-lang="pt-BR">
          <span class="flag">🇧🇷</span>
          <span class="label" id="lang-label-pt">Português (Brasil)</span>
          <span class="check">✓</span>
        </button>
      </div>
    </div>
    <span class="version-badge" id="bitcoin-meta"></span>
    <span class="version-badge" id="app-version"></span>
    <a id="github-link" href="https://github.com/gustavoschaedler/bitcoin-core-terminal" target="_blank" rel="noreferrer noopener" title="Open repository on GitHub" aria-label="Open repository on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
      </svg>
    </a>
  </div>
</div>

<main>
  <aside id="sidebar">
    <div id="sidebar-resizer" title="Drag to resize"></div>
    <div class="aside-top">
      <span class="aside-title" id="snippets-title">Snippets</span>
      <input id="snippet-search" type="text" placeholder="Search snippets..." autocomplete="off" spellcheck="false" />
      <button id="btn-toggle-snippets" type="button" title="Collapse/expand">⟨</button>
    </div>
    <div class="aside-body">
      <div id="snippet-list" data-include="/static/snippets.html"></div>
      <hr class="help-sep" />
      <div class="help-group" id="help-group">
        <button class="help-group-header" id="help-toggle" type="button">
          <span class="caret">▾</span>
          <span id="help-title">Tips</span>
        </button>
        <div class="help-group-body">
          <div id="help-cards"></div>
        </div>
      </div>
    </div>
  </aside>

  <section id="workspace"></section>
</main>

</body>
</html>
