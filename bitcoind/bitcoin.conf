# Run in regtest mode (local development chain)
regtest=1
# Enable JSON-RPC server
server=1
# Maintain a full transaction index (useful for some RPCs)
txindex=1
# Default fee rate used when fee estimation is not available
fallbackfee=0.0002

# JSON-RPC username (must match the WebUI .env / bitcoin-cli.conf)
rpcuser=bitcoin
# JSON-RPC password (must match the WebUI .env / bitcoin-cli.conf)
rpcpassword=bitcoin

[regtest]
# Bind the JSON-RPC server to all interfaces inside the container
rpcbind=0.0.0.0:18443
# Allow JSON-RPC calls from the Docker networks used by docker-compose
rpcallowip=172.16.0.0/12
# JSON-RPC port for regtest
rpcport=18443
# P2P port for regtest
port=18444
